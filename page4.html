<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pibulwitthayalai</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="navbar-container"></div>
    <script src="navbar.js"></script>
    <script>document.addEventListener('DOMContentLoaded', loadMessages);</script>
</body>
</html>

<div class="container">
    <div class="form-card">
        <h2 style="text-align:center; color:var(--gov-red); margin-bottom:20px;">เขียนความในใจ</h2>
        
        <form id="confession-form">
            <div class="form-group">
                <label><strong>ชื่อ:</strong></label>
                <input type="text" name="name" id="name" placeholder="ระบุชื่อของคุณ" required>
            </div>
            
            <div class="form-group">
                <label><strong>เลือกรุ่น:</strong></label>
                <select name="gen" id="gen" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;" required>
                    <option value="" disabled selected>-- กรุณาเลือกรุ่น --</option>
                    <option value="125">รุ่น 125</option>
                    <option value="126">รุ่น 126</option>
                    <option value="127">รุ่น 127</option>
                    <option value="128">รุ่น 128</option>
                </select>
            </div>

            <div class="form-group">
                <label><strong>ความในใจ:</strong></label>
                <textarea name="message" id="msg" rows="5" placeholder="พิมพ์ข้อความของคุณที่นี่..." required></textarea>
            </div>
            
            <button type="submit" id="submitBtn" class="btn" style="width:100%; padding: 12px; margin-top:10px;">ส่งข้อมูลความในใจ</button>
        </form>

        <a href="javascript:void(0)" onclick="goToAdmin()" style="display:block; margin-top:20px; text-align:right; font-size:0.8rem; color:red; text-decoration:none;">
            จัดการข้อมูล (เฉพาะ Admin)
        </a>
    </div>
</div>

<script>
const scriptURL = 'https://script.google.com/macros/s/AKfycbymYdAeQHf7IqTO5EAQiAlRUx4jlHPcng9BNcZb5Z_AaIlq2yH6AEhOTZx3PEsxjRJKAQ/exec';
const form = document.getElementById('confession-form');
const btn = document.getElementById('submitBtn');

form.addEventListener('submit', e => {
    e.preventDefault();
    btn.disabled = true;
    btn.innerText = "กำลังส่งข้อมูล...";

    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(response => {
            alert('ส่งข้อมูลความในใจเรียบร้อยแล้วครับ');
            form.reset();
            btn.disabled = false;
            btn.innerText = "ส่งข้อมูลความในใจ";
        })
        .catch(error => {
            alert('เกิดข้อผิดพลาดในการส่งข้อมูล!');
            btn.disabled = false;
            btn.innerText = "ส่งข้อมูลความในใจ";
        });
});

function goToAdmin() {
    const pass = prompt("กรุณากรอกรหัสผ่าน:");
    if (pass === "251050") { 
        window.location.href = "page6.html";
    } else if (pass !== null) {
        alert("รหัสผ่านไม่ถูกต้อง!");
    }
}
</script>
